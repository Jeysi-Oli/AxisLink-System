<!-- ======================================================================= -->
<!-- MODULE: update_employer_profile.html                                    -->
<!-- DESCRIPTION: Provides an interface for employers to update corporate    -->
<!-- profile information, including industry sector and primary              -->
<!-- contact details.                                                        -->
<!-- ======================================================================= -->

{% extends "base.html" %} {% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-8">
        <div class="glass-card mb-5">
            <!-- ========================================== -->
            <!-- HEADER CONTROLS                            -->
            <!-- ========================================== -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0" style="color: #198754">
                    Update Company Profile
                </h4>
                <a
                    href="/employer"
                    class="btn btn-outline-secondary btn-sm"
                    style="border-radius: 6px"
                    >Back to Dashboard</a
                >
            </div>
            <hr class="text-muted mb-4" />

            <!-- ========================================== -->
            <!-- DATA MUTATION FORM                         -->
            <!-- ========================================== -->

            <!-- Transmits updated employer profile payload to the /update_employer_profile endpoint -->
            <form action="/update_employer_profile" method="POST">
                <!-- Corporate Identity Fields -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted fw-bold"
                            >Company Name</label
                        >
                        <!-- Inject current database record into the input value -->
                        <input
                            type="text"
                            class="form-control"
                            name="company_name"
                            value="{{ employer.company_name }}"
                            required
                        />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted fw-bold"
                            >Industry Sector</label
                        >
                        <input
                            type="text"
                            class="form-control"
                            name="industry_sector"
                            value="{{ employer.industry_sector }}"
                            required
                        />
                    </div>
                </div>

                <!-- Contact & Administrative Fields -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted fw-bold"
                            >Contact Person</label
                        >
                        <input
                            type="text"
                            class="form-control"
                            name="contact_person"
                            value="{{ employer.contact_person }}"
                            required
                        />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted fw-bold"
                            >Contact Number</label
                        >
                        <input
                            type="text"
                            class="form-control"
                            name="contact_number"
                            value="{{ employer.contact_number }}"
                            required
                        />
                    </div>
                </div>

                <!-- Corporate Address Field -->
                <div class="mb-4">
                    <label class="form-label text-muted fw-bold"
                        >Company Address</label
                    >
                    <textarea
                        class="form-control"
                        name="company_address"
                        rows="2"
                        required
                    >
{{ employer.company_address }}</textarea
                    >
                </div>

                <!-- Form execution trigger -->
                <button
                    type="submit"
                    class="btn btn-success w-100 py-2 mt-2 fw-bold"
                >
                    Save Changes
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
