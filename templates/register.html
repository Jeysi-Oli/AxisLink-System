<!-- ======================================================================= -->
<!-- MODULE: register.html                                                   -->
<!-- DESCRIPTION: User registration interface featuring dynamic form fields. -->
<!--              Utilizes client-side scripting to adapt the UI payload     -->
<!--              requirements based on the selected user identity role.     -->
<!-- ======================================================================= -->

{% extends "base.html" %} {% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="glass-card text-center mb-5">
            <h3 class="fw-bold mb-1" style="color: #1e3a8a">Join AxisLink</h3>
            <p class="text-muted mb-4">Create your account to get started.</p>

            <!-- ========================================== -->
            <!-- REGISTRATION PAYLOAD FORM                  -->
            <!-- ========================================== -->

            <!-- Transmits registration payload to the /register endpoint -->
            <form action="/register" method="POST">
                <!-- Base authentication credentials required for all entity types -->
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold" style="color: #2c3e50"
                        >Email Address</label
                    >
                    <input
                        type="email"
                        class="form-control"
                        name="email"
                        placeholder="e.g. user@email.com"
                        required
                        style="padding: 10px"
                    />
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label fw-bold" style="color: #2c3e50"
                        >Password</label
                    >
                    <input
                        type="password"
                        class="form-control"
                        name="password"
                        placeholder="Create a strong password"
                        required
                        style="padding: 10px"
                    />
                </div>

                <!-- ========================================== -->
                <!-- CONDITIONAL ROLE SELECTION                 -->
                <!-- ========================================== -->

                <!-- Role selection dropdown: Dictates conditional rendering of subsequent fields -->
                <div class="mb-4 text-start">
                    <label class="form-label fw-bold" style="color: #2c3e50"
                        >I want to register as a:</label
                    >
                    <select
                        class="form-select"
                        name="role"
                        id="roleSelector"
                        required
                        style="padding: 10px"
                    >
                        <option value="" disabled selected>
                            Select your role...
                        </option>
                        <option value="Learner">
                            Learner (Student / Applicant)
                        </option>
                        <option value="Employer">
                            Employer (Company / Institution)
                        </option>
                    </select>
                </div>

                <!-- ========================================== -->
                <!-- DYNAMIC ENTITY FIELDS                      -->
                <!-- ========================================== -->

                <!-- Identity Sub-Form: Learner Data -->
                <div
                    id="learnerFields"
                    class="d-none text-start mb-4 p-3"
                    style="
                        background-color: #f8f9fa;
                        border-radius: 8px;
                        border-left: 4px solid #0d6efd;
                    "
                >
                    <h6 class="fw-bold text-primary mb-3">
                        Learner Information
                    </h6>
                    <div class="mb-2">
                        <label class="form-label" style="font-size: 0.9rem"
                            >First Name</label
                        >
                        <input
                            type="text"
                            class="form-control"
                            name="first_name"
                            id="fName"
                            placeholder="e.g. John Clarence"
                        />
                    </div>
                    <div class="mb-2">
                        <label class="form-label" style="font-size: 0.9rem"
                            >Last Name</label
                        >
                        <input
                            type="text"
                            class="form-control"
                            name="last_name"
                            id="lName"
                            placeholder="e.g. Oli"
                        />
                    </div>
                </div>

                <!-- Identity Sub-Form: Employer Data -->
                <div
                    id="employerFields"
                    class="d-none text-start mb-4 p-3"
                    style="
                        background-color: #f8f9fa;
                        border-radius: 8px;
                        border-left: 4px solid #198754;
                    "
                >
                    <h6 class="fw-bold text-success mb-3">
                        Employer Information
                    </h6>
                    <div class="mb-2">
                        <label class="form-label" style="font-size: 0.9rem"
                            >Company Name</label
                        >
                        <input
                            type="text"
                            class="form-control"
                            name="company_name"
                            id="compName"
                            placeholder="e.g. Google Philippines"
                        />
                    </div>
                </div>

                <!-- Registration execution trigger -->
                <button
                    type="submit"
                    class="btn btn-custom-blue w-100 py-2 mb-3"
                >
                    Create Account
                </button>
            </form>

            <hr class="text-muted" />

            <!-- ========================================== -->
            <!-- AUTHENTICATION REDIRECT                    -->
            <!-- ========================================== -->

            <!-- Navigation path for pre-existing accounts -->
            <p class="mb-0" style="font-size: 0.9rem">
                Already have an account?
                <a
                    href="/login"
                    style="
                        color: #0d6efd;
                        font-weight: 600;
                        text-decoration: none;
                    "
                    >Login here</a
                >
            </p>
        </div>
    </div>
</div>

<!-- ======================================================================= -->
<!-- CLIENT-SIDE LOGIC                                                       -->
<!-- ======================================================================= -->

<script>
    /**
     * Event listener bound to the role selection dropdown.
     * Dynamically modifies the DOM to display role-specific input fields
     * and toggles HTML5 'required' validation attributes to ensure payload integrity.
     */
    document
        .getElementById('roleSelector')
        .addEventListener('change', function () {
            var role = this.value;

            // DOM Element References
            var learnerBox = document.getElementById('learnerFields');
            var employerBox = document.getElementById('employerFields');
            var fName = document.getElementById('fName');
            var lName = document.getElementById('lName');
            var compName = document.getElementById('compName');

            // Apply visibility and validation rules for Learner entity
            if (role === 'Learner') {
                learnerBox.classList.remove('d-none');
                employerBox.classList.add('d-none');

                fName.required = true;
                lName.required = true;
                compName.required = false;
            }
            // Apply visibility and validation rules for Employer entity
            else if (role === 'Employer') {
                employerBox.classList.remove('d-none');
                learnerBox.classList.add('d-none');

                compName.required = true;
                fName.required = false;
                lName.required = false;
            }
        });
</script>
{% endblock %}
