<!-- ======================================================================= -->
<!-- MODULE: update_institution_profile.html                                 -->
<!-- DESCRIPTION: Administration interface for institutions to modify their  -->
<!-- profile records or perform a destructive account deletion.              -->
<!-- ======================================================================= -->

{% extends "base.html" %} {% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-8">
        <div class="glass-card mb-5">
            <!-- ========================================== -->
            <!-- HEADER CONTROLS                            -->
            <!-- ========================================== -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0" style="color: #e67e22">
                    Update Institution Profile
                </h4>
                <a
                    href="/institution"
                    class="btn btn-outline-secondary btn-sm"
                    style="border-radius: 6px"
                    >Back to Dashboard</a
                >
            </div>

            <hr class="text-muted mb-4" />

            <!-- ========================================== -->
            <!-- DATA MUTATION FORM                         -->
            <!-- ========================================== -->

            <!-- Transmits updated profile payload to the /update_institution_profile endpoint -->
            <form action="/update_institution_profile" method="POST">
                <!-- Institutional Identity Fields -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted fw-bold small"
                            >Institution Name</label
                        >
                        <input
                            type="text"
                            class="form-control"
                            name="institution_name"
                            value="{{ institution.institution_name }}"
                            required
                            style="border-radius: 8px"
                        />
                    </div>

                    <div class="col-md-6">
                        <label class="form-label text-muted fw-bold small"
                            >Accreditation Type</label
                        >
                        <!-- Dropdown initialization logic -->
                        <select
                            class="form-select"
                            name="accreditation_type"
                            required
                            style="border-radius: 8px"
                        >
                            {% set acc_options = ['CHED', 'TESDA', 'DepEd',
                            'Private/Corporate', 'Other'] %}

                            <!-- Iterate options and apply conditional selection based on database state -->
                            {% for opt in acc_options %} {% if
                            institution.accreditation_type == opt %}
                            <option value="{{ opt }}" selected>
                                {{ opt }}
                            </option>
                            {% else %}
                            <option value="{{ opt }}">{{ opt }}</option>
                            {% endif %} {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- Contact Administrative Fields -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted fw-bold small"
                            >Contact Person</label
                        >
                        <input
                            type="text"
                            class="form-control"
                            name="contact_person"
                            value="{{ institution.contact_person }}"
                            required
                            style="border-radius: 8px"
                        />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted fw-bold small"
                            >Contact Number</label
                        >
                        <input
                            type="text"
                            class="form-control"
                            name="contact_number"
                            value="{{ institution.contact_number }}"
                            required
                            style="border-radius: 8px"
                        />
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted fw-bold small"
                        >Headquarters Address</label
                    >
                    <textarea
                        class="form-control"
                        name="headquarters_address"
                        rows="2"
                        required
                        style="border-radius: 8px"
                    >
{{ institution.headquarters_address }}</textarea
                    >
                </div>

                <!-- Profile Update Execution -->
                <button
                    type="submit"
                    class="btn text-white w-100 py-2 mt-2 fw-bold"
                    style="background-color: #e67e22; border-radius: 8px"
                >
                    Save Changes
                </button>
            </form>

            <hr class="my-4 text-muted" />

            <!-- ========================================== -->
            <!-- DESTRUCTIVE ACTION MODULE                  -->
            <!-- ========================================== -->

            <!-- Account deletion form with client-side confirmation safety barrier -->
            <form
                action="/delete_account"
                method="POST"
                onsubmit="
                    return confirm(
                        'Are you sure you want to permanently delete your Institution Account? This will revoke all credentials you have issued.',
                    );
                "
            >
                <button
                    type="submit"
                    class="btn btn-outline-danger w-100 py-2 fw-bold"
                    style="border-radius: 8px"
                >
                    Delete Institution Account
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
