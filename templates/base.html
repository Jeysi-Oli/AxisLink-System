<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AxisLink | National Lifelong Learning Grid</title>

        <!-- BOOTSTRAP 5: Core framework for responsive layout and grid system -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <!-- CUSTOM CSS: Linking your aesthetic design file (style.css) -->
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/style.css') }}"
        />
    </head>
    <body>
        <!-- MAIN NAVIGATION BAR -->
        <nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-4">
            <div class="container">
                <!-- System Logo / Brand Name -->
                <a class="navbar-brand" href="/">
                    <span
                        class="fw-bold"
                        style="font-size: 1.5rem; letter-spacing: 1px"
                        >⚡ AxisLink</span
                    >
                </a>

                <div class="ms-auto text-white d-flex align-items-center">
                    <!-- CONDITIONAL RENDERING LOGIC: Check if a user is currently logged in -->
                    {% if session.get('user_id') %}

                    <!-- Display dynamic role and name based on backend session data -->
                    <span
                        class="badge bg-primary fs-6 me-3"
                        style="border: 1px solid #ffffff50"
                    >
                        {{ session.get('role') }}: {{ session.get('user_id') }}
                    </span>

                    <!-- Logout Button -->
                    <a
                        href="/logout"
                        class="btn btn-sm btn-danger fw-bold"
                        style="border-radius: 8px; transition: all 0.3s"
                        >Logout</a
                    >

                    {% else %}

                    <!-- Login Button (Only visible to guests/logged-out users) -->
                    <a
                        href="/login"
                        class="btn btn-sm btn-outline-light fw-bold"
                        style="border-radius: 8px; transition: all 0.3s"
                        >Login</a
                    >

                    {% endif %}
                </div>
            </div>
        </nav>

        <!-- DYNAMIC CONTENT CONTAINER -->
        <!-- This is where child templates (login.html, register.html, dashboards) will be injected -->
        <div class="container">{% block content %} {% endblock %}</div>

        <!-- BOOTSTRAP JS: Required for dropdowns, toggles, and interactive components -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
