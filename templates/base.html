<!-- ======================================================================= -->
<!-- MODULE: base.html (Master Template)                                     -->
<!-- DESCRIPTION: Master layout template establishing the global UI skeleton,-->
<!--              navigation framework, and common asset dependencies.       -->
<!-- ======================================================================= -->

<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AxisLink | National Lifelong Learning Grid</title>

        <!-- ========================================== -->
        <!-- GLOBAL STYLESHEETS                         -->
        <!-- ========================================== -->

        <!-- External Dependency: Bootstrap 5 Core Framework -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <!-- Internal Dependency: Custom application styling -->
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/style.css') }}"
        />
    </head>
    <body>
        <!-- ========================================== -->
        <!-- TOP NAVIGATION COMPONENT                   -->
        <!-- ========================================== -->
        <nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-4">
            <div class="container">
                <!-- Application Brand Identity -->
                <a class="navbar-brand" href="/">
                    <span
                        class="fw-bold"
                        style="font-size: 1.5rem; letter-spacing: 1px"
                        >⚡ AxisLink</span
                    >
                </a>

                <div class="ms-auto text-white d-flex align-items-center">
                    <!-- ========================================== -->
                    <!-- SESSION-BASED UI RENDERING                 -->
                    <!-- ========================================== -->

                    <!-- Verify active user session state -->
                    {% if session.get('user_id') %}

                    <!-- Render authenticated user context (Role and Identifier) -->
                    <span
                        class="badge bg-primary fs-6 me-3"
                        style="border: 1px solid #ffffff50"
                    >
                        {{ session.get('role') }}: {{ session.get('user_id') }}
                    </span>

                    <!-- Render session termination action -->
                    <a
                        href="/logout"
                        class="btn btn-sm btn-danger fw-bold"
                        style="border-radius: 8px; transition: all 0.3s"
                        >Logout</a
                    >

                    {% else %}

                    <!-- Render authentication entry point for unauthenticated requests -->
                    <a
                        href="/login"
                        class="btn btn-sm btn-outline-light fw-bold"
                        style="border-radius: 8px; transition: all 0.3s"
                        >Login</a
                    >

                    {% endif %}
                </div>
            </div>
        </nav>

        <!-- ========================================== -->
        <!-- DYNAMIC VIEWPORT                           -->
        <!-- ========================================== -->

        <!-- Injection point for rendering child template architectures -->
        <div class="container">{% block content %} {% endblock %}</div>

        <!-- ========================================== -->
        <!-- GLOBAL SCRIPTS                             -->
        <!-- ========================================== -->

        <!-- External Dependency: Bootstrap 5 Interactive Components -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
